<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Saalai TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@500&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var lacksAspectRatio = typeof CSS !== 'undefined' && CSS.supports && !CSS.supports('aspect-ratio', '16/9');
        var match = navigator.userAgent.match(/(?:Chrome|CrMo|CriOS|wv)\/(\d+)/);
        var isOldChrome = match && parseInt(match[1], 10) < 94;
        window.isLegacyTv = isOldChrome || lacksAspectRatio || !window.CSS;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
